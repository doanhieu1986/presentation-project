<!DOCTYPE html>
<html lang="{{LANGUAGE}}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TOPIC}} {{SUBTITLE_BRACKET}}</title>

  <!-- Reveal.js CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@{{REVEALJS_VERSION}}/dist/reveal.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@{{REVEALJS_VERSION}}/dist/theme/black.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@{{REVEALJS_VERSION}}/plugin/highlight/monokai.css">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    /* ===== CSS VARIABLES (từ themes/dark.css — inline vào đây khi generate) ===== */
    /* {{INJECT_THEME_CSS}} */

    /* ===== REVEAL OVERRIDES ===== */
    .reveal-viewport {
      background: var(--color-bg-primary);
    }
    .reveal {
      font-family: var(--font-body);
      font-size: var(--font-size-body);
      color: var(--color-text-primary);
    }

    /* --- Headings --- */
    .reveal h1, .reveal h2, .reveal h3 {
      font-family: var(--font-heading);
      font-weight: var(--font-weight-bold);
      line-height: var(--line-height-tight);
      color: var(--color-text-primary);
      text-transform: none;
      letter-spacing: -0.02em;
    }
    .reveal h1 { font-size: var(--font-size-title); }
    .reveal h2 { font-size: var(--font-size-h1); }
    .reveal h3 {
      font-size: var(--font-size-h2);
      color: var(--color-accent-primary);
      margin-bottom: var(--space-lg);
    }

    /* --- Accent line dưới h2 --- */
    .reveal h2::after {
      content: '';
      display: block;
      width: 48px;
      height: 3px;
      background: var(--color-accent-primary);
      border-radius: 2px;
      margin: var(--space-sm) auto 0;
    }

    /* --- Paragraphs & lists --- */
    .reveal p {
      line-height: var(--line-height-body);
      color: var(--color-text-secondary);
    }
    .reveal ul, .reveal ol {
      text-align: left;
      line-height: var(--line-height-body);
    }
    .reveal ul li {
      list-style: none;
      padding-left: var(--space-lg);
      position: relative;
      margin-bottom: var(--space-sm);
      color: var(--color-text-secondary);
    }
    .reveal ul li::before {
      content: '▸';
      color: var(--color-accent-secondary);
      position: absolute;
      left: 0;
      font-size: 0.9em;
    }

    /* --- Code --- */
    .reveal code {
      font-family: var(--font-mono);
      background: var(--color-bg-accent);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      padding: 0.1em 0.4em;
      font-size: 0.88em;
      color: var(--color-accent-secondary);
    }
    .reveal pre {
      background: var(--color-bg-secondary);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-card);
      width: 100%;
    }
    .reveal pre code {
      background: transparent;
      border: none;
      padding: var(--space-md);
      font-size: 0.82em;
      color: var(--color-text-primary);
    }

    /* --- Links --- */
    .reveal a { color: var(--color-accent-primary); }
    .reveal a:hover { color: #7aa8ff; }

    /* ===== SLIDE LAYOUTS ===== */

    /* Cover slide */
    .slide-cover {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      text-align: center;
    }
    .slide-cover .eyebrow {
      font-size: var(--font-size-small);
      font-weight: var(--font-weight-medium);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--color-accent-primary);
      margin-bottom: var(--space-md);
    }
    .slide-cover h1 {
      font-size: 2.8rem;
      background: linear-gradient(135deg, #e8eaf0 0%, var(--color-accent-primary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: var(--space-md);
    }
    .slide-cover .subtitle {
      font-size: var(--font-size-h2);
      color: var(--color-text-secondary);
      margin-bottom: var(--space-xl);
    }
    .slide-cover .meta {
      font-size: var(--font-size-meta);
      color: var(--color-text-muted);
      letter-spacing: 0.05em;
    }

    /* Section divider */
    .slide-section {
      background: linear-gradient(135deg, var(--color-bg-secondary) 0%, var(--color-bg-accent) 100%);
      border-left: 4px solid var(--color-accent-primary);
    }
    .slide-section h2::after { display: none; }
    .slide-section h2 {
      font-size: 2.2rem;
      color: var(--color-accent-primary);
    }

    /* Two-column layout */
    .cols-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-xl);
      text-align: left;
    }
    .cols-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: var(--space-lg);
      text-align: left;
    }

    /* Card component */
    .card {
      background: var(--color-bg-secondary);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: var(--space-lg);
      box-shadow: var(--shadow-card);
    }
    .card-accent {
      border-top: 3px solid var(--color-accent-primary);
    }

    /* Highlight box */
    .highlight-box {
      background: rgba(91, 141, 238, 0.08);
      border: 1px solid var(--color-border-accent);
      border-left: 4px solid var(--color-accent-primary);
      border-radius: var(--radius-md);
      padding: var(--space-md) var(--space-lg);
      margin: var(--space-md) 0;
    }

    /* Stats / big number */
    .stat-number {
      font-size: 3.5rem;
      font-weight: var(--font-weight-bold);
      color: var(--color-accent-primary);
      line-height: 1;
    }
    .stat-label {
      font-size: var(--font-size-small);
      color: var(--color-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* Tag / badge */
    .tag {
      display: inline-block;
      background: var(--color-bg-accent);
      border: 1px solid var(--color-border-accent);
      color: var(--color-accent-primary);
      border-radius: 99px;
      padding: 0.15em 0.75em;
      font-size: var(--font-size-meta);
      font-weight: var(--font-weight-medium);
    }

    /* Progress indicator */
    .reveal .progress {
      color: var(--color-accent-primary);
      height: 3px;
    }

    /* Slide number */
    .reveal .slide-number {
      background: transparent;
      color: var(--color-text-muted);
      font-family: var(--font-mono);
      font-size: var(--font-size-meta);
    }
  </style>
</head>

<body>
<div class="reveal">
  <div class="slides">

    <!-- ==================== COVER ==================== -->
    <section>
      <div class="slide-cover">
        <div class="eyebrow">{{EYEBROW}}</div>
        <h1>{{TOPIC}}</h1>
        <div class="subtitle">{{SUBTITLE}}</div>
        <div class="meta">{{AUTHOR}} &nbsp;·&nbsp; {{DATE}}</div>
      </div>
    </section>

    <!-- ==================== AGENDA ==================== -->
    <!-- {{IF_INCLUDE_AGENDA}} -->
    <section>
      <h2>Nội dung</h2>
      <ul>
        <!-- {{AGENDA_ITEMS}} -->
      </ul>
    </section>
    <!-- {{END_IF_INCLUDE_AGENDA}} -->

    <!-- ==================== CONTENT SLIDES ==================== -->
    <!-- {{CONTENT_SLIDES}} -->

    <!-- ==================== Q&A / CLOSE ==================== -->
    <!-- {{IF_INCLUDE_QA}} -->
    <section>
      <div class="slide-cover">
        <div class="eyebrow">{{QA_LABEL}}</div>
        <h1>Cảm ơn!</h1>
        <div class="subtitle">{{AUTHOR}}</div>
        <div class="meta">{{CONTACT_INFO}}</div>
      </div>
    </section>
    <!-- {{END_IF_INCLUDE_QA}} -->

  </div><!-- .slides -->
</div><!-- .reveal -->

<!-- Reveal.js -->
<script src="https://cdn.jsdelivr.net/npm/reveal.js@{{REVEALJS_VERSION}}/dist/reveal.js"></script>
<script src="https://cdn.jsdelivr.net/npm/reveal.js@{{REVEALJS_VERSION}}/plugin/highlight/highlight.js"></script>
<script src="https://cdn.jsdelivr.net/npm/reveal.js@{{REVEALJS_VERSION}}/plugin/notes/notes.js"></script>
<script src="https://cdn.jsdelivr.net/npm/reveal.js@{{REVEALJS_VERSION}}/plugin/zoom/zoom.js"></script>

<script>
  Reveal.initialize({
    hash: true,
    transition: '{{TRANSITION_SLIDE}}',
    transitionSpeed: '{{TRANSITION_SPEED}}',
    backgroundTransition: 'fade',
    slideNumber: 'c/t',
    showNotes: false,
    controls: true,
    progress: true,
    center: true,
    plugins: [ RevealHighlight, RevealNotes, RevealZoom ]
  });
</script>

</body>
</html>
